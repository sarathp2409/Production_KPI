<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Production KPI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logout Success Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-green-600 to-blue-600 px-8 py-6">
                <div class="flex items-center justify-center space-x-3">
                    <i class="bi bi-check-circle-fill text-white text-4xl"></i>
                    <div class="text-center">
                        <h1 class="text-2xl font-bold text-white">Successfully Logged Out</h1>
                        <p class="text-green-100 text-sm">See you again soon!</p>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="px-8 py-8">
                <div class="mb-6 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                        <i class="bi bi-box-arrow-right text-green-600 text-3xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">You've been logged out</h2>
                    <p class="text-gray-600 text-sm">Thank you for using Pagination Management system</p>
                </div>

                <!-- Info Box -->
                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg mb-6">
                    <div class="flex items-start">
                        <i class="bi bi-info-circle text-blue-500 text-xl mr-3 mt-0.5"></i>
                        <div class="flex-1">
                            <p class="text-sm text-blue-800">
                                Your session has been ended securely. All your data has been saved.
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="space-y-3">
                    <a
                        href="{% url 'login' %}"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-3 px-6 rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg hover:shadow-xl flex items-center justify-center space-x-2"
                    >
                        <i class="bi bi-box-arrow-in-right text-xl"></i>
                        <span>Login Again</span>
                    </a>

                    <a
                        href="/admin/"
                        class="w-full bg-gray-600 hover:bg-gray-700 text-white font-semibold py-3 px-6 rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-md hover:shadow-lg flex items-center justify-center space-x-2"
                    >
                        <i class="bi bi-gear-fill"></i>
                        <span>Admin Login</span>
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-8 py-4 border-t border-gray-200">
                <div class="text-center text-xs text-gray-500">
                    <p>&copy; 2025 Times Group. All rights reserved.</p>
                </div>
            </div>
        </div>

        <!-- Security Info -->
        <div class="mt-6 text-center">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 text-white">
                <div class="flex items-center justify-center space-x-2 text-sm">
                    <i class="bi bi-shield-check text-xl"></i>
                    <span>Your session was secured</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
